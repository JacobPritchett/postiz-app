---
name: "Build Fork (ARM64 only)"

# Builds a linux/arm64 image of this fork on push to any at/* branch and
# pushes it to ghcr.io/jacobpritchett/postiz-app. We only build arm64 because
# the AT self-host runs on Hetzner CAX11 (Ampere ARM); amd64 would just sit
# unused. Upstream's build-containers.yml still works for amd64+arm64 manifests
# on tag pushes if we ever need both.

on:
  workflow_dispatch:
  push:
    branches:
      - 'at/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tags
        id: tags
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          # Defang the branch name to a docker-tag-safe slug, lowercased.
          BRANCH_SLUG="$(printf '%s' "$REF_NAME" | tr '/' '-' | tr -cd 'a-zA-Z0-9.-' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${SHA::7}"
          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_arg=at-${BRANCH_SLUG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push Image
        env:
          BRANCH_SLUG: ${{ steps.tags.outputs.branch_slug }}
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
          VERSION_ARG: ${{ steps.tags.outputs.version_arg }}
        run: |
          docker buildx build --platform linux/arm64 \
            -f Dockerfile.dev \
            -t "ghcr.io/jacobpritchett/postiz-app:${BRANCH_SLUG}-${SHORT_SHA}" \
            -t "ghcr.io/jacobpritchett/postiz-app:${BRANCH_SLUG}-latest" \
            --build-arg "NEXT_PUBLIC_VERSION=${VERSION_ARG}" \
            --pull \
            --provenance=false --sbom=false \
            --output "type=registry,name=ghcr.io/jacobpritchett/postiz-app:${BRANCH_SLUG}-${SHORT_SHA}" \
            --output "type=registry,name=ghcr.io/jacobpritchett/postiz-app:${BRANCH_SLUG}-latest" \
            .

      - name: Print image digest
        env:
          BRANCH_SLUG: ${{ steps.tags.outputs.branch_slug }}
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/jacobpritchett/postiz-app:${BRANCH_SLUG}-${SHORT_SHA}"
